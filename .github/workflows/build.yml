name: IDA SDK Build Test

on:
  push:
    branches: [ cmake ]
  pull_request:
    branches: [ main, cmake ]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      cmake-changed: ${{ steps.filter.outputs.cmake }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          cmake:
            - 'src/cmake/**'

  # Qt build jobs — only run when src/cmake/** changes and Qt is not cached.
  build-qt-windows:
    needs: detect-changes
    if: needs.detect-changes.outputs.cmake-changed == 'true'
    runs-on: windows-latest
    env:
      IDASDK: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Visual Studio Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Restore Qt6 cache
      id: qt-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

    - name: Configure CMake
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: src
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build Qt6
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: src
      run: cmake --build build --target build_qt --config Release --parallel

    - name: Save Qt6 cache
      if: steps.qt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

  build-qt-linux:
    needs: detect-changes
    if: needs.detect-changes.outputs.cmake-changed == 'true'
    runs-on: ubuntu-latest
    env:
      IDASDK: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build \
          libgl1-mesa-dev libxcb-xinerama0-dev libxkbcommon-dev \
          libxcb-cursor-dev libxcb-icccm4-dev libxcb-image0-dev \
          libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
          libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev

    - name: Restore Qt6 cache
      id: qt-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

    - name: Configure CMake
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: src
      run: cmake -B build -G Ninja

    - name: Build Qt6
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: src
      run: cmake --build build --target build_qt --parallel

    - name: Save Qt6 cache
      if: steps.qt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

  build-qt-macos:
    needs: detect-changes
    if: needs.detect-changes.outputs.cmake-changed == 'true'
    runs-on: macos-latest
    env:
      IDASDK: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        brew install cmake ninja

    - name: Restore Qt6 cache
      id: qt-cache
      uses: actions/cache/restore@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

    - name: Configure CMake
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: src
      run: cmake -B build -G Ninja

    - name: Build Qt6
      if: steps.qt-cache.outputs.cache-hit != 'true'
      working-directory: src
      run: cmake --build build --target build_qt --parallel

    - name: Save Qt6 cache
      if: steps.qt-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

  # SDK build jobs — build all C++ components, upload bin/ as artifact.
  build-windows:
    runs-on: windows-latest
    env:
      IDASDK: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Visual Studio Developer Environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: |
          src/build/vcpkg_installed
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('src/vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-

    - name: Restore Qt6 cache
      uses: actions/cache/restore@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

    - name: Configure CMake
      working-directory: src
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build SDK (all components)
      working-directory: src
      run: cmake --build build --config Release --parallel

    - name: Build Statistics
      working-directory: src
      shell: bash
      run: |
        echo "=== Build Results ==="
        echo "Plugins built: $(ls -1 bin/plugins/*.dll 2>/dev/null | wc -l)"
        echo "Loaders built: $(ls -1 bin/loaders/*.dll 2>/dev/null | wc -l)"
        echo "Processors built: $(ls -1 bin/procs/*.dll 2>/dev/null | wc -l)"
        echo ""
        echo "=== Qt Plugin Status ==="
        if [ -f "bin/plugins/qproject.dll" ]; then
          echo "[OK] qproject.dll built successfully"
        else
          echo "[SKIP] qproject.dll failed to build (Qt may not be available)"
        fi
        if [ -f "bin/plugins/qwindow.dll" ]; then
          echo "[OK] qwindow.dll built successfully"
        else
          echo "[SKIP] qwindow.dll failed to build (Qt may not be available)"
        fi

    - name: Upload SDK build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sdk-build-windows
        path: |
          src/bin/
        retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    env:
      IDASDK: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build \
          libgl1-mesa-dev libxcb-xinerama0-dev libxkbcommon-dev \
          libxcb-cursor-dev libxcb-icccm4-dev libxcb-image0-dev \
          libxcb-keysyms1-dev libxcb-randr0-dev libxcb-render-util0-dev \
          libxcb-shape0-dev libxcb-sync-dev libxcb-xfixes0-dev

    - name: Restore Qt6 cache
      uses: actions/cache/restore@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

    - name: Configure CMake
      working-directory: src
      run: cmake -B build -G Ninja

    - name: Build SDK (all components)
      working-directory: src
      run: cmake --build build --parallel

    - name: Build Statistics
      working-directory: src
      run: |
        echo "=== Build Results ==="
        echo "Plugins built: $(ls -1 bin/plugins/*.so 2>/dev/null | wc -l)"
        echo "Loaders built: $(ls -1 bin/loaders/*.so 2>/dev/null | wc -l)"
        echo "Processors built: $(ls -1 bin/procs/*.so 2>/dev/null | wc -l)"
        echo ""
        echo "=== Qt Plugin Status ==="
        if [ -f "bin/plugins/qproject.so" ]; then
          echo "[OK] qproject.so built successfully"
        else
          echo "[SKIP] qproject.so failed to build (Qt may not be available)"
        fi
        if [ -f "bin/plugins/qwindow.so" ]; then
          echo "[OK] qwindow.so built successfully"
        else
          echo "[SKIP] qwindow.so failed to build (Qt may not be available)"
        fi

    - name: Upload SDK build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sdk-build-linux
        path: |
          src/bin/
        retention-days: 7

  build-macos:
    runs-on: macos-latest
    env:
      IDASDK: ${{ github.workspace }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install build dependencies
      run: |
        brew install cmake ninja

    - name: Restore Qt6 cache
      uses: actions/cache/restore@v4
      with:
        path: |
          src/build/qt-install
          src/build/qt-src
        key: ${{ runner.os }}-qt6-${{ hashFiles('src/cmake/**') }}

    - name: Configure CMake
      working-directory: src
      run: cmake -B build -G Ninja

    - name: Build SDK (all components)
      working-directory: src
      run: cmake --build build --parallel

    - name: Build Statistics
      working-directory: src
      run: |
        echo "=== Build Results ==="
        echo "Plugins built: $(ls -1 bin/plugins/*.dylib 2>/dev/null | wc -l)"
        echo "Loaders built: $(ls -1 bin/loaders/*.dylib 2>/dev/null | wc -l)"
        echo "Processors built: $(ls -1 bin/procs/*.dylib 2>/dev/null | wc -l)"
        echo ""
        echo "=== Qt Plugin Status ==="
        if [ -f "bin/plugins/qproject.dylib" ]; then
          echo "[OK] qproject.dylib built successfully"
        else
          echo "[SKIP] qproject.dylib failed to build (Qt may not be available)"
        fi
        if [ -f "bin/plugins/qwindow.dylib" ]; then
          echo "[OK] qwindow.dylib built successfully"
        else
          echo "[SKIP] qwindow.dylib failed to build (Qt may not be available)"
        fi

    - name: Upload SDK build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sdk-build-macos
        path: |
          src/bin/
        retention-days: 7

  # IDAPython build jobs — each platform starts as soon as its SDK build completes.
  idapython-windows:
    needs: build-windows
    uses: ./.github/workflows/idapython-build.yml
    with:
      platform: windows
      os: windows-latest
      sdk-artifact: sdk-build-windows

  idapython-linux:
    needs: build-linux
    uses: ./.github/workflows/idapython-build.yml
    with:
      platform: linux
      os: ubuntu-latest
      sdk-artifact: sdk-build-linux

  idapython-macos:
    needs: build-macos
    uses: ./.github/workflows/idapython-build.yml
    with:
      platform: macos
      os: macos-latest
      sdk-artifact: sdk-build-macos
